server:
  port: 8080

spring:
  application:
    name: api-gateway
  codec:
    # Allow large multipart bodies (avatar photos / CVs) through the gateway.
    # Default is 256KB, which silently fails uploads of most real photos.
    max-in-memory-size: 15MB
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: post-service
          uri: ${POST_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/posts/**

        - id: event-service
          uri: ${EVENT_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/events/**, /api/clubs/**

        - id: job-service
          uri: ${JOB_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/jobs/**, /api/applications/**, /api/mentoring/**

        - id: message-service
          uri: ${MESSAGE_SERVICE_URI:http://localhost:8085}
          predicates:
            - "Path=/api/messages/**, /api/conversations/**, /api/notifications/**, /api/groups, /api/groups/**"

        - id: resource-service
          uri: ${RESOURCE_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/resources/**

        - id: cv-analyzer
          uri: ${CV_ANALYZER_URI:http://localhost:8090}
          predicates:
            - Path=/api/cv-analyzer/**
          filters:
            - RewritePath=/api/cv-analyzer/(?<segment>.*), /${segment}

        - id: chatbot-service
          uri: ${CHATBOT_SERVICE_URI:http://localhost:8091}
          predicates:
            - Path=/api/chatbot/**
          filters:
            - RewritePath=/api/chatbot/(?<segment>.*), /${segment}

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET}
