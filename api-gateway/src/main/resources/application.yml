server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: post-service
          uri: ${POST_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/posts/**

        - id: event-service
          uri: ${EVENT_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/events/**, /api/clubs/**

        - id: job-service
          uri: ${JOB_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/jobs/**, /api/applications/**, /api/mentoring/**

        - id: message-service
          uri: ${MESSAGE_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/messages/**, /api/conversations/**, /api/notifications/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:4201"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
