server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/api/posts/**

        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/events/**, /api/clubs/**

        - id: job-service
          uri: lb://job-service
          predicates:
            - Path=/api/jobs/**, /api/applications/**, /api/mentoring/**

        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/api/messages/**, /api/conversations/**, /api/notifications/**

        - id: foyer-service
          uri: lb://foyer-service
          predicates:
            - Path=/api/foyer/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
