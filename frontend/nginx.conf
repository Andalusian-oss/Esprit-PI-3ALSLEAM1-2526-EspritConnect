server {
    listen 4200;

    client_max_body_size 20M;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST API calls to api-gateway
    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket connections to message-service
    location /ws/ {
        proxy_pass http://message-service:8085/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Angular SPA - serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS server - required for camera/mic access (secure context) from LAN
server {
    listen 4443 ssl;
    ssl_certificate /etc/nginx/ssl/self.crt;
    ssl_certificate_key /etc/nginx/ssl/self.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST API calls to api-gateway
    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket connections to message-service
    location /ws/ {
        proxy_pass http://message-service:8085/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Angular SPA - serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
